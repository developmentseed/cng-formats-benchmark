# Example point-cloud dataset descriptor: a SWOT L2 HR PIXC delivery.
#
# The heaviest SWOT arm: one netCDF *pixel cloud* per granule, flat under `source`
# (`SWOT_L2_HR_PIXC_*.nc`, ~0.4–0.95 GB each). Like the SWOT Raster100m reader
# this is a *granule* layout, but a component is a point-cloud group, not a CF
# raster: `reader` selects the SwotPixcDataset, which enumerates the `.nc` granules
# and, from the `options` below, the groups to read as points — one COPC per
# group. The COPC adapter's point loader reads the group's lon/lat/height with
# xarray in place. `groups` defaults to the primary `pixel_cloud` group. `source`
# is the granule root; replace it with a reachable prefix — nothing here is
# provider-specific.
id: example-swot-pixc
description: Example SWOT L2 HR PIXC pixel cloud (netCDF group -> COPC).
source: s3://example-bucket/PIXC_Nom_France/
baseline_format: netcdf
reader: swot-pixc
target_formats:
  - copc
options:
  groups: [pixel_cloud]
grouping_lever:
  # The object-grouping lever is the COPC octree: sweep the octree depth (and the
  # per-node point budget via `span`) against the tiers. The granules already
  # clear the cold tiers as single objects, so the lever is about preserving
  # range-addressable partial access, not reaching a size floor.
  copc_max_depth: [null, 6]
