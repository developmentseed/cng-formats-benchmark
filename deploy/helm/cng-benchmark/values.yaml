# Default values for the cng-benchmark chart.
#
# This file documents every knob; the per-target overlays (values-local.yaml,
# values-lab.yaml) set only what differs. Adding a dataset or benchmark is a
# change here (the `configs` map), never a change to the templates.

nameOverride: ""
fullnameOverride: ""

image:
  # Published runner image. `tag` empty → the chart's appVersion (which
  # release-please bumps with each release), so a default install pulls the
  # matching released image. Override for a local/edge image (see values-local).
  repository: ghcr.io/developmentseed/cng-benchmark-runner
  tag: ""
  pullPolicy: IfNotPresent

# The benchmark the runner executes. `configFile` names a key in the `configs`
# map below (mounted at /configs). `source` (baseline raster to convert) and
# `output` are storage URIs handed to the runner as flags, keeping the config
# itself portable. Set `datasetFile` (another `configs` key) to fan the run out
# over a layout-aware dataset's product(s) via `--dataset` instead of the
# single-source `--source` path; leave it empty for the single-object path.
runner:
  configFile: synthetic_cog.yaml
  datasetFile: ""
  source: s3://bench/fixtures/fixture.tif
  output: s3://bench/results/
  backoffLimit: 0

# Seed a synthetic fixture raster before the run. Local/CI only — for a real run
# against real data, disable this and point runner.source at the real bucket.
seed:
  enabled: true
  dest: s3://bench/fixtures/fixture.tif
  size: 512

# S3 access. The same settings drive boto3 (runner) and GDAL (TiTiler); only the
# endpoint and credentials differ between MinIO and a real provider.
s3:
  # Explicit endpoint override for S3-compatible storage. Leave empty to derive
  # it automatically: the in-cluster MinIO Service when minio.enabled, otherwise
  # the provider's default endpoint (real AWS/Scaleway via region).
  endpoint: ""
  region: us-east-1
  # If set, credentials are read from this pre-existing Secret (keys
  # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY). This is how the lab target
  # injects real credentials. If empty, a Secret is created from the values
  # below (only suitable for the disposable MinIO stand-in).
  existingSecret: ""
  accessKey: minioadmin
  secretKey: minioadmin

# Optional distinct SOURCE provider (read-only), for runs whose source lives on
# a different endpoint / credentials / CA than the sink — e.g. a CNES Datalake
# source read on the fly with a Scaleway sink (#4). Disabled by default: the
# source then shares the sink's S3 settings (the synthetic single-endpoint
# path), so this stays off for local/CI.
s3Source:
  enabled: false
  endpoint: ""
  region: ""
  # Read-only credentials: reference an existing Secret (preferred for the lab),
  # or have one created from the literals below.
  existingSecret: ""
  accessKey: ""
  secretKey: ""
  # Private-CA bundle for the source endpoint, supplied as a Secret holding the
  # PEM under caBundleKey. Mounted into the runner; SOURCE_AWS_CA_BUNDLE (boto3)
  # and GDAL_HTTP_CAINFO (/vsis3) point at it.
  caBundleSecret: ""
  caBundleKey: ca-bundle.pem

# Disposable in-cluster MinIO. ON for local/CI, OFF for the lab (real S3).
minio:
  enabled: true
  image: minio/minio:latest
  mcImage: minio/mc:latest
  bucket: bench
  rootUser: minioadmin
  rootPassword: minioadmin

# TiTiler tile service. Health-probed on /healthz; the display metric measures
# tiles against it. Serves both COG (/cog) and GeoZarr (/zarr) since TiTiler 2.0
# — no separate titiler-xarray service is needed.
titiler:
  enabled: true
  image: ghcr.io/developmentseed/titiler:latest
  port: 8000
  replicas: 1

# Optional PVC for results when not writing to S3. Off by default (S3 path).
results:
  pvc:
    enabled: false
    size: 1Gi
    mountPath: /results

resources: {}

# Pod scheduling for the runner Job. Empty by default (schedule anywhere). A
# real target pins the runner to a dedicated pool — e.g. a Scaleway Kapsule
# benchmark pool that scales from zero — via nodeSelector (see values-lab).
nodeSelector: {}
tolerations: []
affinity: {}

# Benchmark/dataset configs mounted into the runner at /configs. Add datasets
# here; the templates never change.
configs:
  synthetic_cog.yaml: |
    id: synthetic-cog-end-to-end
    dataset: synthetic-cog
    formats:
      - cog
    metrics:
      - write
      - object_size
      - read
      - display
    tiers:
      - name: warm
        min_object_bytes: 33554432
      - name: cold
        min_object_bytes: 104857600
    params:
      block_size: 256
