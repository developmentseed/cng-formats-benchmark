{{- if not .Values.s3.existingSecret }}
# Created only when no existing Secret is referenced. Suitable for the
# disposable MinIO stand-in; the lab target sets s3.existingSecret to inject
# real credentials instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cng-benchmark.s3SecretName" . }}
  labels:
    {{- include "cng-benchmark.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.secretKey | quote }}
{{- end }}
{{- if and .Values.s3Source.enabled (not .Values.s3Source.existingSecret) }}
---
# Source credentials, created only when a distinct source provider is enabled
# without an existing Secret. The lab target sets s3Source.existingSecret to
# inject the real (read-only) Datalake credentials instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cng-benchmark.s3SourceSecretName" . }}
  labels:
    {{- include "cng-benchmark.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.s3Source.accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3Source.secretKey | quote }}
{{- end }}
