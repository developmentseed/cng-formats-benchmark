apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cng-benchmark.fullname" . }}-runner
  labels:
    {{- include "cng-benchmark.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  backoffLimit: {{ .Values.runner.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "cng-benchmark.labels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      restartPolicy: Never
      initContainers:
        {{- if and .Values.minio.enabled }}
        - name: createbucket
          image: {{ .Values.minio.mcImage | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local "$AWS_ENDPOINT_URL" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"; do
                echo "waiting for object store..."; sleep 2;
              done
              mc mb --ignore-existing "local/{{ .Values.minio.bucket }}"
          env:
            {{- include "cng-benchmark.s3Env" . | nindent 12 }}
        {{- end }}
        {{- if .Values.seed.enabled }}
        - name: seed
          image: {{ include "cng-benchmark.runnerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["seed", "--dest", {{ .Values.seed.dest | quote }}, "--size", {{ .Values.seed.size | quote }}]
          env:
            {{- include "cng-benchmark.s3Env" . | nindent 12 }}
        {{- end }}
        {{- if .Values.titiler.enabled }}
        # Gate the run on TiTiler readiness — the display metric calls it and
        # does not retry, so the Job must not start before it serves /healthz.
        - name: wait-titiler
          image: {{ include "cng-benchmark.runnerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/.venv/bin/python", "-c"]
          args:
            - |
              import time, urllib.request, sys
              url = "http://{{ include "cng-benchmark.fullname" . }}-titiler:{{ .Values.titiler.port }}/healthz"
              for _ in range(120):
                  try:
                      urllib.request.urlopen(url, timeout=3)
                      print("titiler ready"); sys.exit(0)
                  except Exception as e:  # noqa: BLE001
                      print("waiting for titiler:", e); time.sleep(2)
              print("titiler did not become ready"); sys.exit(1)
        {{- end }}
      containers:
        - name: runner
          image: {{ include "cng-benchmark.runnerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - /configs/{{ .Values.runner.configFile }}
            - --source
            - {{ .Values.runner.source | quote }}
            - --output
            - {{ .Values.runner.output | quote }}
          env:
            {{- include "cng-benchmark.s3Env" . | nindent 12 }}
            {{- include "cng-benchmark.gdalEnv" . | nindent 12 }}
            {{- include "cng-benchmark.sourceEnv" . | nindent 12 }}
            {{- if .Values.titiler.enabled }}
            # TiTiler endpoint for the display metric (read via --titiler-endpoint envvar).
            - name: TITILER_ENDPOINT
              value: {{ printf "http://%s-titiler:%v" (include "cng-benchmark.fullname" .) .Values.titiler.port | quote }}
            {{- end }}
          volumeMounts:
            - name: configs
              mountPath: /configs
              readOnly: true
            {{- if and .Values.s3Source.enabled .Values.s3Source.caBundleSecret }}
            - name: source-ca
              mountPath: /etc/cng/source-ca
              readOnly: true
            {{- end }}
            {{- if .Values.results.pvc.enabled }}
            - name: results
              mountPath: {{ .Values.results.pvc.mountPath }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: configs
          configMap:
            name: {{ include "cng-benchmark.fullname" . }}-configs
        {{- if and .Values.s3Source.enabled .Values.s3Source.caBundleSecret }}
        - name: source-ca
          secret:
            secretName: {{ .Values.s3Source.caBundleSecret }}
        {{- end }}
        {{- if .Values.results.pvc.enabled }}
        - name: results
          persistentVolumeClaim:
            claimName: {{ include "cng-benchmark.fullname" . }}-results
        {{- end }}
