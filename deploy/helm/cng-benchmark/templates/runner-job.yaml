apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cng-benchmark.fullname" . }}-runner
  labels:
    {{- include "cng-benchmark.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  backoffLimit: {{ .Values.runner.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "cng-benchmark.labels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      restartPolicy: Never
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if and .Values.minio.enabled }}
        - name: createbucket
          image: {{ .Values.minio.mcImage | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local "$AWS_ENDPOINT_URL" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"; do
                echo "waiting for object store..."; sleep 2;
              done
              mc mb --ignore-existing "local/{{ .Values.minio.bucket }}"
          env:
            {{- include "cng-benchmark.s3Env" . | nindent 12 }}
        {{- end }}
        {{- if .Values.seed.enabled }}
        - name: seed
          image: {{ include "cng-benchmark.runnerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["seed", "--dest", {{ .Values.seed.dest | quote }}, "--size", {{ .Values.seed.size | quote }}]
          env:
            {{- include "cng-benchmark.s3Env" . | nindent 12 }}
        {{- end }}
        {{- if eq (include "cng-benchmark.displayEnabled" .) "true" }}
        # Gate the run on the selected display server's readiness — the display
        # metric calls it and does not retry, so the Job must not start before the
        # Service routes a ready endpoint. A TCP connect works for both surfaces
        # (TiTiler /cog and titiler-xarray, whose readiness probe is tcpSocket).
        - name: wait-display
          image: {{ include "cng-benchmark.runnerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/.venv/bin/python", "-c"]
          args:
            - |
              import socket, time, sys
              host, _, port = "{{ include "cng-benchmark.displayHostPort" . }}".partition(":")
              for _ in range(120):
                  try:
                      socket.create_connection((host, int(port)), timeout=3).close()
                      print("display server ready"); sys.exit(0)
                  except OSError as e:
                      print("waiting for display server:", e); time.sleep(2)
              print("display server did not become ready"); sys.exit(1)
        {{- end }}
      containers:
        - name: runner
          image: {{ include "cng-benchmark.runnerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - /configs/{{ .Values.runner.configFile }}
            {{- if .Values.runner.datasetFile }}
            - --dataset
            - /configs/{{ .Values.runner.datasetFile }}
            {{- else }}
            - --source
            - {{ .Values.runner.source | quote }}
            {{- end }}
            - --output
            - {{ .Values.runner.output | quote }}
          env:
            {{- include "cng-benchmark.s3Env" . | nindent 12 }}
            {{- include "cng-benchmark.gdalEnv" . | nindent 12 }}
            {{- include "cng-benchmark.sourceEnv" . | nindent 12 }}
            {{- if eq (include "cng-benchmark.displayEnabled" .) "true" }}
            # Display endpoint for the runner (--titiler-endpoint envvar): the
            # surface selected by runner.displaySurface (cog TiTiler or
            # titiler-xarray). The runner picks the tile path by object_kind.
            - name: TITILER_ENDPOINT
              value: {{ printf "http://%s" (include "cng-benchmark.displayHostPort" .) | quote }}
            {{- end }}
          volumeMounts:
            - name: configs
              mountPath: /configs
              readOnly: true
            {{- if and .Values.s3Source.enabled .Values.s3Source.caBundleSecret }}
            - name: source-ca
              mountPath: /etc/cng/source-ca
              readOnly: true
            {{- end }}
            {{- if .Values.results.pvc.enabled }}
            - name: results
              mountPath: {{ .Values.results.pvc.mountPath }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: configs
          configMap:
            name: {{ include "cng-benchmark.fullname" . }}-configs
        {{- if and .Values.s3Source.enabled .Values.s3Source.caBundleSecret }}
        - name: source-ca
          secret:
            secretName: {{ .Values.s3Source.caBundleSecret }}
        {{- end }}
        {{- if .Values.results.pvc.enabled }}
        - name: results
          persistentVolumeClaim:
            claimName: {{ include "cng-benchmark.fullname" . }}-results
        {{- end }}
