# Lab overlay: SWOT-C — PIXC pixel cloud -> COPC, on the Scaleway cluster.
#
# A single-command install of the SWOT PIXC arm against the staged samples
# (Scaleway `s3://cnes-cng-study/PIXC_Nom_France/`). Source and sink are the same
# provider (the samples live on Scaleway), so there is no distinct source: the
# source role falls back to the sink's Scaleway credentials (s3Source stays off).
# To read the source from the CNES Datalake instead, enable `s3Source` as
# values-lab.yaml does.
#
# Prerequisite — create the Scaleway sink credentials secret in the namespace:
#   kubectl create secret generic cng-benchmark-s3 \
#     --from-literal=AWS_ACCESS_KEY_ID=<key> \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<secret>
#
# Install:
#   helm install swot-pixc deploy/helm/cng-benchmark \
#     -f deploy/helm/cng-benchmark/values-lab-swot-pixc.yaml

image:
  repository: ghcr.io/developmentseed/cng-benchmark-runner
  tag: ""            # empty -> the chart appVersion (the matching released image)
  pullPolicy: Always

# Real providers: no in-cluster MinIO, no synthetic seed.
minio:
  enabled: false
seed:
  enabled: false

# Sink (and, by fallback, source): Scaleway. The staged PIXC samples live here.
s3:
  endpoint: https://s3.fr-par.scw.cloud
  region: fr-par
  existingSecret: cng-benchmark-s3

# A point cloud has no display metric, so no tile server is needed.
titiler:
  enabled: false

# Pin to the dedicated benchmark pool (scales from zero); a PIXC -> COPC
# conversion is heavy and should not land on the small always-on pool.
nodeSelector:
  k8s.scaleway.com/pool-name: pool-bench

runner:
  configFile: swot_pixc_copc.yaml
  datasetFile: swot_pixc.yaml
  # Sink prefix for result.json/summary.md and the produced COPC objects.
  output: s3://cnes-cng-study/benchmark-results/swot-pixc-copc/

configs:
  swot_pixc_copc.yaml: |
    id: swot-pixc-copc
    dataset: swot-pixc
    formats:
      - copc
    metrics:
      - write
      - object_size
      - read
    tiers:
      - name: tier2-disk
        min_object_bytes: 33554432
      - name: tier3-tape
        min_object_bytes: 104857600
    params:
      span: 128
      max_depth: null
      scope: product-set
      products:
        prefix: ""
        limit: 3
      samples:
        read: 1
  swot_pixc.yaml: |
    id: swot-pixc
    description: SWOT L2 HR PIXC pixel cloud -> COPC.
    source: s3://cnes-cng-study/PIXC_Nom_France/
    baseline_format: netcdf
    reader: swot-pixc
    target_formats:
      - copc
    options:
      groups: [pixel_cloud]
