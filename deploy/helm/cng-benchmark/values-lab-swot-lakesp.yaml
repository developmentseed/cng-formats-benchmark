# Lab overlay: SWOT-B — LakeSP Prior shapefile -> GeoParquet, on the Scaleway cluster.
#
# A single-command install of the SWOT LakeSP arm against the staged samples
# (Scaleway `s3://cnes-cng-study/LakeSP_Prior_Nom_France/`). Source and sink are
# the same provider (the samples live on Scaleway), so the source role falls back
# to the sink's Scaleway credentials (s3Source stays off). To read the source from
# the CNES Datalake instead, enable `s3Source` as values-lab.yaml does.
#
# Prerequisite — create the Scaleway sink credentials secret in the namespace:
#   kubectl create secret generic cng-benchmark-s3 \
#     --from-literal=AWS_ACCESS_KEY_ID=<key> \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<secret>
#
# Install:
#   helm install swot-lakesp deploy/helm/cng-benchmark \
#     -f deploy/helm/cng-benchmark/values-lab-swot-lakesp.yaml

image:
  repository: ghcr.io/developmentseed/cng-benchmark-runner
  tag: ""
  pullPolicy: Always

minio:
  enabled: false
seed:
  enabled: false

s3:
  endpoint: https://s3.fr-par.scw.cloud
  region: fr-par
  existingSecret: cng-benchmark-s3

# A vector table has no display metric, so no tile server is needed.
titiler:
  enabled: false

nodeSelector:
  k8s.scaleway.com/pool-name: pool-bench

runner:
  configFile: swot_lakesp_geoparquet.yaml
  datasetFile: swot_lakesp_prior.yaml
  output: s3://cnes-cng-study/benchmark-results/swot-lakesp-geoparquet/

configs:
  swot_lakesp_geoparquet.yaml: |
    id: swot-lakesp-geoparquet
    dataset: swot-lakesp-prior
    formats:
      - geoparquet
    metrics:
      - write
      - object_size
      - read
    tiers:
      - name: tier2-disk
        min_object_bytes: 33554432
      - name: tier3-tape
        min_object_bytes: 104857600
    params:
      row_group_rows: 50000
      spatial_partitioning: true
      compression: zstd
      scope: product-set
      products:
        prefix: ""
        limit: 3
      samples:
        read: 1
  swot_lakesp_prior.yaml: |
    id: swot-lakesp-prior
    description: SWOT L2 HR LakeSP Prior pass (zipped shapefile -> GeoParquet).
    source: s3://cnes-cng-study/LakeSP_Prior_Nom_France/
    baseline_format: shapefile
    reader: swot-lakesp-prior
    target_formats:
      - geoparquet
