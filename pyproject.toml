[project]
name = "cng-benchmark"
version = "0.0.0"
description = "Deployable benchmarking system for cloud-native geospatial formats"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Development Seed" }]
keywords = ["benchmark", "cloud-native", "geospatial", "cog", "zarr", "copc", "geoparquet"]
dependencies = [
    "typer>=0.12",
    "pydantic>=2",
    "pyyaml>=6",
]

[project.scripts]
cng-benchmark = "cng_benchmark.cli:app"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cng_benchmark"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"