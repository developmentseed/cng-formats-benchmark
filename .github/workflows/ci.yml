name: CI

# CI builds the runner image, unit-tests the harness, and (from M2) proves the
# stack deploys. It never runs a benchmark — benchmarks run on deployed
# infrastructure against real data.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: Unit tests
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.runner
          push: false
          load: true
          tags: cng-benchmark-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the runner entry point
        run: docker run --rm cng-benchmark-runner:ci version

  # Deployability (docker-compose up --wait, and a kind cluster bring-up that
  # `helm install`s the stack and asserts the runner Job + TiTiler are healthy)
  # is added in M2, once the stack exists.
