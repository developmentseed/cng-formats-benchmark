site_name: cng-formats-benchmark
site_description: A reusable, deployable benchmarking system for cloud-native geospatial formats.
site_url: https://developmentseed.github.io/cng-formats-benchmark/
repo_url: https://github.com/developmentseed/cng-formats-benchmark
repo_name: developmentseed/cng-formats-benchmark
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

validation:
  links:
    anchors: warn
    unrecognized_links: warn

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Deployment: deployment.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
